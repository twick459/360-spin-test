<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
            will-change: transform; /* оптимизация рендеринга */
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        /* Используем canvas вместо img для лучшей производительности */
        #spin-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 2;
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
            z-index: 1;
        }

        /* Кастомный спиннер */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .controls-hint.visible {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .controls-hint {
                font-size: 12px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <div class="loader" id="loader"></div>
    <div class="blur-bg" id="blurBg"></div>
    <canvas id="spin-canvas" width="1920" height="1080"></canvas>
</div>
<div class="controls-hint" id="controlsHint">
    🖱️ Перетащи мышкой | 👆 Или свайпни с инерцией
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 70;
    const IMAGE_PATH = "images/";
    const FILE_PREFIX = "out";
    const FILE_SUFFIX = ".jpeg";
    const ZERO_PADDING = 0;
    
    // Настройки инерции
    const INERTIA_DECAY = 0.92;
    const INERTIA_STOP_SPEED = 0.01;
    
    // Оптимизация: лимит предзагрузки (не грузим все 70 сразу)
    const PRELOAD_LIMIT = 10;  // предзагружаем только 5 соседних кадров с каждой стороны
    // ===================================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    // Кэш изображений (чтобы не перезагружать повторно)
    const imageCache = new Map();
    
    // Асинхронная загрузка изображения с кэшем
    function loadImageAsync(frame, callback) {
        const url = getImageUrl(frame);
        
        if (imageCache.has(url)) {
            callback(imageCache.get(url));
            return;
        }
        
        const img = new Image();
        img.onload = () => {
            imageCache.set(url, img);
            callback(img);
        };
        img.src = url;
    }

    let currentFrame = 1;
    let isDragging = false;
    let lastX = 0;
    let lastTimestamp = 0;
    let velocity = 0;
    let inertiaAnimationId = null;
    let currentImage = null;
    
    const viewer = document.getElementById('spin-viewer');
    const canvas = document.getElementById('spin-canvas');
    const ctx = canvas.getContext('2d');
    const blurBg = document.getElementById('blurBg');
    const loader = document.getElementById('loader');
    const controlsHint = document.getElementById('controlsHint');

    // Установка размера canvas
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        // Перерисовываем текущее изображение
        if (currentImage) {
            drawImageOnCanvas(currentImage);
        }
    }

    // Отрисовка изображения на canvas с object-fit: contain
    function drawImageOnCanvas(img) {
        if (!img || !canvas || !ctx) return;
        
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        const imgWidth = img.width;
        const imgHeight = img.height;
        
        // Вычисляем пропорции для object-fit: contain
        const scale = Math.min(canvasWidth / imgWidth, canvasHeight / imgHeight);
        const drawWidth = imgWidth * scale;
        const drawHeight = imgHeight * scale;
        const offsetX = (canvasWidth - drawWidth) / 2;
        const offsetY = (canvasHeight - drawHeight) / 2;
        
        // Очищаем и рисуем
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
    }

    function updateImage(frame, skipPreload = false) {
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        const roundedFrame = Math.round(frame);
        
        if (currentFrame !== roundedFrame) {
            currentFrame = roundedFrame;
            
            // Загружаем и отображаем изображение
            loadImageAsync(currentFrame, (img) => {
                currentImage = img;
                drawImageOnCanvas(img);
            });
            
            // Умная предзагрузка: только соседние кадры
            if (!skipPreload) {
                preloadAdjacentFrames(currentFrame);
            }
        }
    }
    
    // Предзагрузка только ближайших кадров (не всех 70)
    function preloadAdjacentFrames(frame) {
        const start = Math.max(1, frame - PRELOAD_LIMIT);
        const end = Math.min(TOTAL_FRAMES, frame + PRELOAD_LIMIT);
        
        for (let i = start; i <= end; i++) {
            if (i !== frame) {
                const url = getImageUrl(i);
                if (!imageCache.has(url)) {
                    const img = new Image();
                    img.src = url;
                    imageCache.set(url, img); // кэшируем сразу по URL
                }
            }
        }
    }

    function getFrameFromPosition(clientX) {
        const width = window.innerWidth;
        let t = clientX / width;
        t = Math.max(0, Math.min(1, t));
        return 1 + t * (TOTAL_FRAMES - 1);
    }

    function startInertia() {
        if (inertiaAnimationId) cancelAnimationFrame(inertiaAnimationId);
        
        let lastFrameTime = performance.now();
        let currentVelocity = velocity;
        let currentFrameValue = currentFrame;
        
        function animateInertia(now) {
            const dt = Math.min(32, now - lastFrameTime);
            lastFrameTime = now;
            
            currentFrameValue += currentVelocity * dt;
            currentVelocity *= INERTIA_DECAY;
            
            updateImage(currentFrameValue, true);
            
            if (Math.abs(currentVelocity) > INERTIA_STOP_SPEED) {
                inertiaAnimationId = requestAnimationFrame(animateInertia);
            } else {
                updateImage(Math.round(currentFrameValue));
                inertiaAnimationId = null;
                velocity = 0;
            }
        }
        
        inertiaAnimationId = requestAnimationFrame(animateInertia);
    }

    function onDragStart(e) {
        e.preventDefault();
        
        if (inertiaAnimationId) {
            cancelAnimationFrame(inertiaAnimationId);
            inertiaAnimationId = null;
        }
        
        isDragging = true;
        velocity = 0;
        
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        lastX = clientX;
        lastTimestamp = performance.now();
        
        const newFrame = getFrameFromPosition(clientX);
        updateImage(newFrame);
        
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const now = performance.now();
        const dt = Math.max(1, now - lastTimestamp);
        
        const deltaPx = currentX - lastX;
        const pixelVelocity = deltaPx / dt;
        const frameVelocity = pixelVelocity / window.innerWidth * TOTAL_FRAMES;
        velocity = frameVelocity * 0.7;
        
        const newFrame = getFrameFromPosition(currentX);
        updateImage(newFrame, true);
        
        lastX = currentX;
        lastTimestamp = now;
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
        
        if (Math.abs(velocity) > 0.02) {
            startInertia();
        } else {
            velocity = 0;
            updateImage(Math.round(currentFrame));
        }
    }

    function hideLoader() {
        if (loader) loader.style.display = 'none';
    }

    function showControlsHint() {
        controlsHint.classList.add('visible');
    }

    // ИНИЦИАЛИЗАЦИЯ
    function init() {
        const firstImageUrl = getImageUrl(1);
        
        // Устанавливаем статичный blur фон
        blurBg.style.backgroundImage = `url('${firstImageUrl}')`;
        
        // Настраиваем canvas
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (currentImage) drawImageOnCanvas(currentImage);
        });
        
        // Загружаем первое изображение
        loadImageAsync(1, (img) => {
            currentImage = img;
            drawImageOnCanvas(img);
            hideLoader();
            setTimeout(() => showControlsHint(), 100);
            
            // Предзагружаем первые 10 кадров для плавного старта
            for (let i = 2; i <= Math.min(10, TOTAL_FRAMES); i++) {
                loadImageAsync(i, () => {});
            }
        });
        
        console.log(`🚀 Оптимизированный плеер | Кадров: ${TOTAL_FRAMES}`);
        console.log(`📁 Путь: ${IMAGE_PATH}out1.jpeg ... out${TOTAL_FRAMES}.jpeg`);
        console.log(`⚡ Кэш включён | Предзагрузка: ±${PRELOAD_LIMIT} кадров`);
    }

    // События
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);
    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    init();
</script>
</body>
</html>
