<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .viewer-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        #spin-viewer {
            width: 100%;
            aspect-ratio: 16 / 9;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
        }

        .controls-info {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
            color: #ccc;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .controls-info span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .controls-info span:before {
            content: "🖱️";
            font-size: 18px;
        }

        .controls-info span:last-child:before {
            content: "📜";
        }

        @media (max-width: 600px) {
            .controls-info {
                font-size: 12px;
                gap: 20px;
            }
        }

        .loading {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="viewer-wrapper">
        <div id="spin-viewer">
            <img id="spin-image" src="" alt="360° облёт объекта">
        </div>
    </div>
    <div class="controls-info">
        <span>Перетащи мышкой</span>
        <span>или крути колёсико</span>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ (под out1.jpeg, out2.jpeg ...) ====================
    const TOTAL_FRAMES = 15;              // ⚠️ ИЗМЕНИТЕ: сколько у вас файлов? (out1.jpeg, out2.jpeg ... out36.jpeg)
    const IMAGE_PATH = "images/";         // Папка с картинками
    const FILE_PREFIX = "out";            // Префикс перед номером (для ваших файлов "out")
    const FILE_SUFFIX = ".jpeg";          // Расширение (у вас .jpeg)
    const ZERO_PADDING = 0;               // 0 = без ведущих нулей (out1, out2, а не out01)
    // ==============================================================================

    // Автоматическое создание имени файла
    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            // Без ведущих нулей: out1.jpeg, out2.jpeg и т.д.
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    let startX = 0;
    let startFrame = 1;
    let dragSensitivity = 2.5;
    let wheelSensitivity = 0.8;

    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');

    function preloadAdjacentFrames(frame) {
        const prev = frame === 1 ? TOTAL_FRAMES : frame - 1;
        const next = frame === TOTAL_FRAMES ? 1 : frame + 1;
        const imgPrev = new Image();
        const imgNext = new Image();
        imgPrev.src = getImageUrl(prev);
        imgNext.src = getImageUrl(next);
    }

    function updateImage(frame, skipPreload = false) {
        if (frame < 1) frame = TOTAL_FRAMES;
        if (frame > TOTAL_FRAMES) frame = 1;
        currentFrame = frame;
        const newSrc = getImageUrl(currentFrame);
        if (imgElement.src !== newSrc) {
            imgElement.src = newSrc;
        }
        if (!skipPreload) preloadAdjacentFrames(currentFrame);
    }

    // Проверка в консоли
    const testPath = getImageUrl(1);
    console.log(`📸 Плеер настроен. Ищет файлы: ${testPath}`);
    console.log(`📸 Всего кадров: ${TOTAL_FRAMES}`);
    console.log(`📸 Расширение: .jpeg`);
    
    // Загружаем первый кадр
    updateImage(1, false);

    // Обработчик колёсика
    viewer.addEventListener('wheel', (e) => {
        e.preventDefault();
        let delta = e.deltaY > 0 ? 1 : -1;
        let newFrame = currentFrame + (delta * wheelSensitivity);
        newFrame = Math.round(newFrame);
        if (newFrame > TOTAL_FRAMES) newFrame = 1;
        if (newFrame < 1) newFrame = TOTAL_FRAMES;
        updateImage(newFrame);
    }, { passive: false });

    // Обработчик перетаскивания
    function onDragStart(e) {
        e.preventDefault();
        isDragging = true;
        startX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        startFrame = currentFrame;
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        let currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        let deltaX = currentX - startX;
        let frameShift = Math.round(deltaX / dragSensitivity);
        let newFrame = startFrame + frameShift;
        while (newFrame > TOTAL_FRAMES) newFrame -= TOTAL_FRAMES;
        while (newFrame < 1) newFrame += TOTAL_FRAMES;
        updateImage(newFrame, true);
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
        preloadAdjacentFrames(currentFrame);
    }

    // Мышь
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);

    // Тач-события для мобильных
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);

    viewer.addEventListener('dragstart', (e) => e.preventDefault());
</script>
</body>
</html>
