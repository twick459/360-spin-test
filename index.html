<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Полноэкранный контейнер */
        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        /* Основное изображение (чёткое, по центру) */
        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            position: relative;
            z-index: 2;
        }

        /* Размытый фон (сильный blur) */
        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
            z-index: 1;
            transition: background-image 0.1s ease;
        }

        /* Подсказка для пользователя */
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .controls-hint {
                font-size: 12px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <div class="blur-bg" id="blur-bg"></div>
    <img id="spin-image" src="" alt="360° облёт объекта">
</div>
<div class="controls-hint">
    🖱️ Перетащи мышкой влево-вправо | 👆 Или пальцем
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 15;              // 15 картинок
    const IMAGE_PATH = "images/";         // Папка с картинками
    const FILE_PREFIX = "out";            // Префикс: "out"
    const FILE_SUFFIX = ".jpeg";          // Расширение: .jpeg
    const ZERO_PADDING = 0;               // 0 = out1, out2 (без нулей)
    // ===================================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    
    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');
    const blurBg = document.getElementById('blur-bg');

    function updateImage(frame) {
        // Циклическая коррекция
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        if (currentFrame !== frame) {
            currentFrame = frame;
            const imageUrl = getImageUrl(currentFrame);
            imgElement.src = imageUrl;
            // Обновляем размытый фон той же картинкой
            blurBg.style.backgroundImage = `url('${imageUrl}')`;
        }
    }

    // Функция для получения номера кадра по позиции мыши
    function getFrameFromPosition(clientX) {
        const width = window.innerWidth;
        let t = clientX / width;
        t = Math.max(0, Math.min(1, t));
        let frame = Math.floor(t * TOTAL_FRAMES) + 1;
        return Math.min(TOTAL_FRAMES, Math.max(1, frame));
    }

    // === ОБРАБОТЧИК ПЕРЕТАСКИВАНИЯ ===
    function onDragStart(e) {
        e.preventDefault();
        isDragging = true;
        viewer.style.cursor = 'grabbing';
        
        // Сразу обновляем кадр по текущей позиции
        const startX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const newFrame = getFrameFromPosition(startX);
        updateImage(newFrame);
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        let currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const newFrame = getFrameFromPosition(currentX);
        updateImage(newFrame);
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
    }

    // Мышь
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);

    // Тач-события для мобильных
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);

    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    // Загружаем первый кадр
    updateImage(1);
    
    console.log(`✅ 360° плеер готов! Кадров: ${TOTAL_FRAMES}`);
    console.log(`📁 Первый файл: ${getImageUrl(1)}`);
    console.log(`🎨 Сильный blur (30px) добавлен вместо чёрных полей`);
</script>
</body>
</html>
