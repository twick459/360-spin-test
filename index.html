<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта с инерцией</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #spin-image.loaded {
            opacity: 1;
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
            z-index: 1;
            opacity: 1;
            transition: none;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .controls-hint.visible {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .controls-hint {
                font-size: 12px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <div class="loader" id="loader"></div>
    <div class="blur-bg" id="blurBg"></div>
    <img id="spin-image" src="" alt="360° облёт объекта">
</div>
<div class="controls-hint" id="controlsHint">
    🖱️ Перетащи мышкой | 👆 Или свайпни с инерцией
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 70;
    const IMAGE_PATH = "images/";
    const FILE_PREFIX = "out";
    const FILE_SUFFIX = ".jpeg";
    const ZERO_PADDING = 0;
    
    // Настройки инерции
    const INERTIA_DECAY = 0.92;
    const INERTIA_STOP_SPEED = 0.01;
    // ===================================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    let dragStartFrame = 1;
    let dragStartX = 0;
    let lastX = 0;
    let lastTimestamp = 0;
    let velocity = 0;
    let inertiaAnimationId = null;
    
    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');
    const blurBg = document.getElementById('blurBg');
    const loader = document.getElementById('loader');
    const controlsHint = document.getElementById('controlsHint');

    function hideLoader() {
        if (loader) loader.style.display = 'none';
    }

    function showControlsHint() {
        controlsHint.classList.add('visible');
    }

    // Обновление изображения по номеру кадра
    function updateImage(frame, skipPreload = false) {
        // Нормализуем кадр в диапазон 1..TOTAL_FRAMES
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        const roundedFrame = Math.round(frame);
        
        if (currentFrame !== roundedFrame) {
            currentFrame = roundedFrame;
            const imageUrl = getImageUrl(currentFrame);
            
            if (imgElement.src !== imageUrl) {
                imgElement.src = imageUrl;
            }
        }
    }

    // ОТНОСИТЕЛЬНОЕ перетаскивание: смещение мыши → смещение кадров
    function onDragStart(e) {
        e.preventDefault();
        
        // Останавливаем текущую инерцию
        if (inertiaAnimationId) {
            cancelAnimationFrame(inertiaAnimationId);
            inertiaAnimationId = null;
        }
        
        isDragging = true;
        velocity = 0;
        
        // Запоминаем начальную позицию и текущий кадр
        dragStartX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        dragStartFrame = currentFrame;
        lastX = dragStartX;
        lastTimestamp = performance.now();
        
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const now = performance.now();
        const dt = Math.max(1, now - lastTimestamp);
        
        // Вычисляем смещение по горизонтали
        const deltaX = currentX - dragStartX;
        
        // Конвертируем смещение пикселей в смещение кадров
        // Чем шире экран, тем больше пикселей нужно для полного оборота
        const deltaFrames = (deltaX / window.innerWidth) * TOTAL_FRAMES;
        
        // Новый кадр = начальный кадр + смещение
        let newFrame = dragStartFrame + deltaFrames;
        
        // Нормализуем кадр
        while (newFrame > TOTAL_FRAMES) newFrame -= TOTAL_FRAMES;
        while (newFrame < 1) newFrame += TOTAL_FRAMES;
        
        // Вычисляем скорость для инерции (по текущему движению)
        const deltaX_last = currentX - lastX;
        const pixelVelocity = deltaX_last / dt;
        const frameVelocity = (pixelVelocity / window.innerWidth) * TOTAL_FRAMES;
        velocity = frameVelocity * 0.7;
        
        // Обновляем изображение
        updateImage(newFrame);
        
        lastX = currentX;
        lastTimestamp = now;
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
        
        // Запускаем инерцию, если скорость достаточна
        if (Math.abs(velocity) > 0.02) {
            startInertia();
        } else {
            velocity = 0;
            // Доводим до целого кадра
            updateImage(Math.round(currentFrame));
        }
    }

    // Анимация инерции
    function startInertia() {
        if (inertiaAnimationId) cancelAnimationFrame(inertiaAnimationId);
        
        let lastFrameTime = performance.now();
        let currentVelocity = velocity;
        let currentFrameValue = currentFrame;
        
        function animateInertia(now) {
            const dt = Math.min(32, now - lastFrameTime);
            lastFrameTime = now;
            
            // Обновляем позицию по скорости
            currentFrameValue += currentVelocity * dt;
            
            // Применяем затухание
            currentVelocity *= INERTIA_DECAY;
            
            // Обновляем изображение
            updateImage(currentFrameValue);
            
            // Продолжаем или останавливаемся
            if (Math.abs(currentVelocity) > INERTIA_STOP_SPEED) {
                inertiaAnimationId = requestAnimationFrame(animateInertia);
            } else {
                updateImage(Math.round(currentFrameValue));
                inertiaAnimationId = null;
                velocity = 0;
            }
        }
        
        inertiaAnimationId = requestAnimationFrame(animateInertia);
    }

    // ИНИЦИАЛИЗАЦИЯ
    function init() {
        const firstImageUrl = getImageUrl(1);
        
        // Устанавливаем статичный blur фон из первого кадра
        blurBg.style.backgroundImage = `url('${firstImageUrl}')`;
        console.log('🎨 Blur фон установлен из первого кадра (статичен)');
        
        // Загружаем основное изображение
        const img = new Image();
        
        img.onload = function() {
            console.log('✅ Первое изображение загружено:', firstImageUrl);
            imgElement.src = firstImageUrl;
            imgElement.classList.add('loaded');
            hideLoader();
            setTimeout(() => showControlsHint(), 100);
            
            // Предзагружаем остальные кадры в фоне
            preloadRemainingFrames();
        };
        
        img.onerror = function() {
            console.error('❌ Ошибка загрузки первого изображения:', firstImageUrl);
            console.error('Проверьте: папка images/ и файлы out1.jpeg, out2.jpeg... до out70.jpeg');
            hideLoader();
            imgElement.alt = 'Ошибка: файлы не найдены. Проверьте папку images/out1.jpeg';
        };
        
        img.src = firstImageUrl;
    }
    
    function preloadRemainingFrames() {
        for (let i = 2; i <= TOTAL_FRAMES; i++) {
            const img = new Image();
            img.src = getImageUrl(i);
        }
        console.log(`📦 Предзагружено ${TOTAL_FRAMES - 1} кадров в фоне`);
    }

    // События
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);
    
    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    // Запуск
    init();
    
    console.log(`🚀 360° плеер запущен. Всего кадров: ${TOTAL_FRAMES}`);
    console.log(`📁 Ожидается папка: ${IMAGE_PATH}`);
    console.log(`📸 Первый файл: ${getImageUrl(1)}`);
    console.log(`🎨 Blur фон статичен, скролл ОТНОСИТЕЛЬНЫЙ (без рывков)`);
</script>
</body>
</html>
