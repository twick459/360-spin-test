<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360° Облёт объекта с инерцией</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #spin-image.loaded {
            opacity: 1;
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
            z-index: 1;
            opacity: 1;
            transition: none;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Подсказка с отступом для безопасной зоны */
        .controls-hint {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .controls-hint.visible {
            opacity: 1;
        }

        /* Кнопка полноэкранного режима с отступом для безопасной зоны */
        .fullscreen-btn {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            right: calc(20px + env(safe-area-inset-right, 0px));
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .fullscreen-btn:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-icon {
            width: 20px;
            height: 20px;
            fill: white;
            display: block;
        }

        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            .fullscreen-btn {
                width: 40px;
                height: 40px;
            }
            .fullscreen-icon {
                width: 18px;
                height: 18px;
            }
            .controls-hint {
                font-size: 12px;
                padding: 6px 12px;
            }
        }

        /* Дополнительный отступ для iPhone с динамическим островом и домашней индикацией */
        @supports (padding: max(0px)) {
            .controls-hint {
                bottom: max(20px, env(safe-area-inset-bottom, 20px));
            }
            .fullscreen-btn {
                bottom: max(20px, env(safe-area-inset-bottom, 20px));
                right: max(20px, env(safe-area-inset-right, 20px));
            }
        }

        #spin-viewer:-webkit-full-screen {
            width: 100%;
            height: 100%;
        }
        #spin-viewer:fullscreen {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <div class="loader" id="loader"></div>
    <div class="blur-bg" id="blurBg"></div>
    <img id="spin-image" src="" alt="360° облёт объекта">
    
    <div class="controls-hint" id="controlsHint">
        🖱️ Перетащи мышкой | 👆 Или свайпни с инерцией
    </div>
    
    <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим">
        <svg class="fullscreen-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </button>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 70;
    const IMAGE_PATH = "images/";
    const FILE_PREFIX = "out";
    const FILE_SUFFIX = ".jpeg";
    const ZERO_PADDING = 0;
    
    const INERTIA_DECAY = 0.92;
    const INERTIA_STOP_SPEED = 0.01;
    // ===================================================

    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');
    const blurBg = document.getElementById('blurBg');
    const loader = document.getElementById('loader');
    const controlsHint = document.getElementById('controlsHint');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // ========== ПОЛНОЭКРАННЫЙ РЕЖИМ ==========
    function toggleFullscreen() {
        const elem = viewer;
        
        const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || 
                               document.mozFullScreenElement || document.msFullscreenElement);
        
        if (!isFullscreen) {
            const requestMethod = elem.requestFullscreen ||
                                  elem.webkitRequestFullscreen ||
                                  elem.mozRequestFullScreen ||
                                  elem.msRequestFullscreen;
            
            if (requestMethod) {
                requestMethod.call(elem);
            }
            
            if (elem.webkitEnterFullscreen) {
                elem.webkitEnterFullscreen();
            }
            
            updateFullscreenIcon(true);
        } else {
            const exitMethod = document.exitFullscreen ||
                               document.webkitExitFullscreen ||
                               document.mozCancelFullScreen ||
                               document.msExitFullscreen;
            
            if (exitMethod) {
                exitMethod.call(document);
            }
            updateFullscreenIcon(false);
        }
    }

    function updateFullscreenIcon(isFullscreen) {
        const svg = fullscreenBtn.querySelector('.fullscreen-icon');
        if (isFullscreen) {
            svg.innerHTML = '<path d="M8 14H6v4h4v-2H8v-2zm-2-4h2V8h2V6H6v4zm10 4h-2v2h-2v2h4v-4zm-2-8v2h2v2h2V6h-4z"/>';
        } else {
            svg.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
    }

    const fullscreenEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
    fullscreenEvents.forEach(event => {
        document.addEventListener(event, () => {
            const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || 
                                   document.mozFullScreenElement || document.msFullscreenElement);
            updateFullscreenIcon(isFullscreen);
        });
    });

    fullscreenBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });
    
    fullscreenBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleFullscreen();
    }, { passive: false });
    // ==========================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    let dragStartFrame = 1;
    let dragStartX = 0;
    let lastX = 0;
    let lastTimestamp = 0;
    let velocity = 0;
    let inertiaAnimationId = null;

    function hideLoader() {
        if (loader) loader.style.display = 'none';
    }

    function showControlsHint() {
        controlsHint.classList.add('visible');
    }

    function updateImage(frame, skipPreload = false) {
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        const roundedFrame = Math.round(frame);
        
        if (currentFrame !== roundedFrame) {
            currentFrame = roundedFrame;
            const imageUrl = getImageUrl(currentFrame);
            
            if (imgElement.src !== imageUrl) {
                imgElement.src = imageUrl;
            }
        }
    }

    function onDragStart(e) {
        e.preventDefault();
        
        if (inertiaAnimationId) {
            cancelAnimationFrame(inertiaAnimationId);
            inertiaAnimationId = null;
        }
        
        isDragging = true;
        velocity = 0;
        
        dragStartX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        dragStartFrame = currentFrame;
        lastX = dragStartX;
        lastTimestamp = performance.now();
        
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const now = performance.now();
        const dt = Math.max(1, now - lastTimestamp);
        
        const deltaX = currentX - dragStartX;
        const deltaFrames = (deltaX / window.innerWidth) * TOTAL_FRAMES;
        
        let newFrame = dragStartFrame + deltaFrames;
        
        while (newFrame > TOTAL_FRAMES) newFrame -= TOTAL_FRAMES;
        while (newFrame < 1) newFrame += TOTAL_FRAMES;
        
        const deltaX_last = currentX - lastX;
        const pixelVelocity = deltaX_last / dt;
        const frameVelocity = (pixelVelocity / window.innerWidth) * TOTAL_FRAMES;
        velocity = frameVelocity * 0.7;
        
        updateImage(newFrame);
        
        lastX = currentX;
        lastTimestamp = now;
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
        
        if (Math.abs(velocity) > 0.02) {
            startInertia();
        } else {
            velocity = 0;
            updateImage(Math.round(currentFrame));
        }
    }

    function startInertia() {
        if (inertiaAnimationId) cancelAnimationFrame(inertiaAnimationId);
        
        let lastFrameTime = performance.now();
        let currentVelocity = velocity;
        let currentFrameValue = currentFrame;
        
        function animateInertia(now) {
            const dt = Math.min(32, now - lastFrameTime);
            lastFrameTime = now;
            
            currentFrameValue += currentVelocity * dt;
            currentVelocity *= INERTIA_DECAY;
            
            updateImage(currentFrameValue);
            
            if (Math.abs(currentVelocity) > INERTIA_STOP_SPEED) {
                inertiaAnimationId = requestAnimationFrame(animateInertia);
            } else {
                updateImage(Math.round(currentFrameValue));
                inertiaAnimationId = null;
                velocity = 0;
            }
        }
        
        inertiaAnimationId = requestAnimationFrame(animateInertia);
    }

    function init() {
        const firstImageUrl = getImageUrl(1);
        
        blurBg.style.backgroundImage = `url('${firstImageUrl}')`;
        console.log('🎨 Blur фон установлен из первого кадра (статичен)');
        
        const img = new Image();
        
        img.onload = function() {
            console.log('✅ Первое изображение загружено:', firstImageUrl);
            imgElement.src = firstImageUrl;
            imgElement.classList.add('loaded');
            hideLoader();
            setTimeout(() => showControlsHint(), 100);
            preloadRemainingFrames();
        };
        
        img.onerror = function() {
            console.error('❌ Ошибка загрузки первого изображения:', firstImageUrl);
            console.error('Проверьте: папка images/ и файлы out1.jpeg, out2.jpeg... до out70.jpeg');
            hideLoader();
            imgElement.alt = 'Ошибка: файлы не найдены. Проверьте папку images/out1.jpeg';
        };
        
        img.src = firstImageUrl;
    }
    
    function preloadRemainingFrames() {
        for (let i = 2; i <= TOTAL_FRAMES; i++) {
            const img = new Image();
            img.src = getImageUrl(i);
        }
        console.log(`📦 Предзагружено ${TOTAL_FRAMES - 1} кадров в фоне`);
    }

    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);
    
    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    init();
    
    console.log(`🚀 360° плеер запущен. Всего кадров: ${TOTAL_FRAMES}`);
    console.log(`📁 Ожидается папка: ${IMAGE_PATH}`);
    console.log(`📸 Первый файл: ${getImageUrl(1)}`);
    console.log(`🖥️ Кнопка и подсказка подняты для safe-area`);
</script>
</body>
</html>
