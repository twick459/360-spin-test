<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Полноэкранный контейнер */
        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* ← было cover, стало contain - изображение вписывается целиком */
            pointer-events: none;
            display: block;
            background: #000;     /* чёрные поля по бокам, если нужно */
        }

        /* Подсказка для пользователя */
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .controls-hint {
                font-size: 12px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <img id="spin-image" src="" alt="360° облёт объекта">
</div>
<div class="controls-hint">
    🖱️ Перетащи мышкой влево-вправо | 👆 Или пальцем
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 15;              // ⚠️ СКОЛЬКО У ВАС ФАЙЛОВ? (out1.jpeg, out2.jpeg ...)
    const IMAGE_PATH = "images/";         // Папка с картинками
    const FILE_PREFIX = "out";            // Префикс: "out"
    const FILE_SUFFIX = ".jpeg";          // Расширение: .jpeg (или .jpg)
    const ZERO_PADDING = 0;               // 0 = out1, out2 (без нулей)
    // ===================================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    let startX = 0;
    let startFrame = 1;
    
    // Чувствительность: 1 полный оборот = ширина экрана
    // Чем больше число, тем медленнее вращение. 1 = ровно от левого до правого края = полный 360°
    const SENSITIVITY = 1.0;   // Не меняйте, если не понимаете эффект

    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');

    function updateImage(frame) {
        // Циклическая коррекция
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        if (currentFrame !== frame) {
            currentFrame = frame;
            imgElement.src = getImageUrl(currentFrame);
        }
    }

    // Функция привязки кадра к позиции мыши (от 0 до ширины экрана)
    function updateFrameFromPosition(clientX) {
        // Получаем ширину видимой области
        const width = window.innerWidth;
        // Нормализуем позицию от 0 до 1 (0 = левый край, 1 = правый край)
        let t = clientX / width;
        // Ограничиваем от 0 до 1
        t = Math.max(0, Math.min(1, t));
        // Переводим в номер кадра (1..TOTAL_FRAMES)
        let frame = Math.floor(t * TOTAL_FRAMES) + 1;
        // Корректируем границы
        frame = Math.min(TOTAL_FRAMES, Math.max(1, frame));
        updateImage(frame);
    }

    // === ОБРАБОТЧИК ПЕРЕТАСКИВАНИЯ (как в примере) ===
    function onDragStart(e) {
        e.preventDefault();
        isDragging = true;
        // Запоминаем начальную позицию и текущий кадр
        startX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        startFrame = currentFrame;
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        let currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        let deltaX = currentX - startX;
        
        if (deltaX === 0) return;
        
        // Нормализуем смещение относительно ширины экрана
        const width = window.innerWidth;
        let deltaNormalized = deltaX / width;
        
        // Вычисляем новый кадр: начальный кадр + смещение в кадрах
        let newFrame = startFrame + (deltaNormalized * TOTAL_FRAMES);
        
        updateImage(Math.round(newFrame));
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
    }

    // Мышь
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);

    // Тач-события для мобильных
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);

    // Запрещаем перетаскивание самого изображения
    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    // Загружаем первый кадр и центрируем позицию (левый край = кадр 1)
    updateImage(1);
    
    // Небольшой лог в консоль
    console.log(`✅ 360° плеер готов! Кадров: ${TOTAL_FRAMES}`);
    console.log(`📁 Первый файл: ${getImageUrl(1)}`);
</script>
</body>
</html>
