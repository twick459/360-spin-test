<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360° Облёт объекта с инерцией</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        #spin-viewer {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #spin-viewer:active {
            cursor: grabbing;
        }

        #spin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            position: relative;
            z-index: 2;
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
            z-index: 1;
            transition: background-image 0.05s ease;
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .controls-hint {
                font-size: 12px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
<div id="spin-viewer">
    <div class="blur-bg" id="blur-bg"></div>
    <img id="spin-image" src="" alt="360° облёт объекта">
</div>
<div class="controls-hint">
    🖱️ Перетащи мышкой | 👆 Или свайпни с инерцией
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const TOTAL_FRAMES = 15;              // 15 картинок
    const IMAGE_PATH = "images/";         // Папка с картинками
    const FILE_PREFIX = "out";            // Префикс: "out"
    const FILE_SUFFIX = ".jpeg";          // Расширение: .jpeg
    const ZERO_PADDING = 0;               // 0 = out1, out2 (без нулей)
    
    // Настройки инерции
    const INERTIA_DECAY = 0.92;           // Скорость затухания (0.92 = плавно, 0.98 = дольше)
    const INERTIA_STOP_SPEED = 0.01;      // Минимальная скорость для остановки
    // ===================================================

    function getImageUrl(frameNumber) {
        if (ZERO_PADDING > 0) {
            const paddedNum = frameNumber.toString().padStart(ZERO_PADDING, '0');
            return `${IMAGE_PATH}${FILE_PREFIX}${paddedNum}${FILE_SUFFIX}`;
        } else {
            return `${IMAGE_PATH}${FILE_PREFIX}${frameNumber}${FILE_SUFFIX}`;
        }
    }

    let currentFrame = 1;
    let isDragging = false;
    let lastX = 0;
    let lastTimestamp = 0;
    let velocity = 0;                      // Скорость в кадрах/мс
    let inertiaAnimationId = null;
    
    const viewer = document.getElementById('spin-viewer');
    const imgElement = document.getElementById('spin-image');
    const blurBg = document.getElementById('blur-bg');

    function updateImage(frame, skipBlurUpdate = false) {
        // Циклическая коррекция
        while (frame > TOTAL_FRAMES) frame -= TOTAL_FRAMES;
        while (frame < 1) frame += TOTAL_FRAMES;
        
        if (Math.abs(currentFrame - frame) > 0.1) {
            currentFrame = frame;
            const imageUrl = getImageUrl(Math.round(currentFrame));
            imgElement.src = imageUrl;
            if (!skipBlurUpdate) {
                blurBg.style.backgroundImage = `url('${imageUrl}')`;
            }
        }
    }

    // Получить номер кадра из позиции (от 0 до width)
    function getFrameFromPosition(clientX) {
        const width = window.innerWidth;
        let t = clientX / width;
        t = Math.max(0, Math.min(1, t));
        return 1 + t * (TOTAL_FRAMES - 1);
    }

    // Анимация инерции
    function startInertia() {
        if (inertiaAnimationId) cancelAnimationFrame(inertiaAnimationId);
        
        let lastFrameTime = performance.now();
        let currentVelocity = velocity;
        let currentFrameValue = currentFrame;
        
        function animateInertia(now) {
            const dt = Math.min(32, now - lastFrameTime);
            lastFrameTime = now;
            
            // Обновляем позицию по скорости
            currentFrameValue += currentVelocity * dt;
            
            // Применяем затухание
            currentVelocity *= INERTIA_DECAY;
            
            // Обновляем изображение
            updateImage(currentFrameValue);
            
            // Продолжаем анимацию, если скорость достаточна
            if (Math.abs(currentVelocity) > INERTIA_STOP_SPEED) {
                inertiaAnimationId = requestAnimationFrame(animateInertia);
            } else {
                // Финализируем до целого кадра
                updateImage(Math.round(currentFrameValue));
                inertiaAnimationId = null;
                velocity = 0;
            }
        }
        
        inertiaAnimationId = requestAnimationFrame(animateInertia);
    }

    // === ОБРАБОТЧИК ПЕРЕТАСКИВАНИЯ С ИЗМЕРЕНИЕМ СКОРОСТИ ===
    function onDragStart(e) {
        e.preventDefault();
        
        // Останавливаем текущую инерцию
        if (inertiaAnimationId) {
            cancelAnimationFrame(inertiaAnimationId);
            inertiaAnimationId = null;
        }
        
        isDragging = true;
        velocity = 0;
        
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        lastX = clientX;
        lastTimestamp = performance.now();
        
        // Устанавливаем кадр по текущей позиции
        const newFrame = getFrameFromPosition(clientX);
        updateImage(newFrame);
        
        viewer.style.cursor = 'grabbing';
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const currentX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const now = performance.now();
        const dt = Math.max(1, now - lastTimestamp);
        
        // Вычисляем мгновенную скорость (пиксели/мс)
        const deltaPx = currentX - lastX;
        const pixelVelocity = deltaPx / dt;
        
        // Конвертируем скорость пикселей в скорость кадров
        // от левого края до правого = TOTAL_FRAMES кадров
        const frameVelocity = pixelVelocity / window.innerWidth * TOTAL_FRAMES;
        velocity = frameVelocity * 0.7; // небольшое сглаживание
        
        // Обновляем позицию
        const newFrame = getFrameFromPosition(currentX);
        updateImage(newFrame);
        
        lastX = currentX;
        lastTimestamp = now;
    }

    function onDragEnd(e) {
        isDragging = false;
        viewer.style.cursor = 'grab';
        
        // Запускаем инерцию, если скорость достаточна
        if (Math.abs(velocity) > 0.02) {
            startInertia();
        } else {
            velocity = 0;
            // Доводим до целого кадра
            updateImage(Math.round(currentFrame));
        }
    }

    // Мышь
    viewer.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);

    // Тач-события для мобильных
    viewer.addEventListener('touchstart', onDragStart, { passive: false });
    viewer.addEventListener('touchmove', onDragMove, { passive: false });
    viewer.addEventListener('touchend', onDragEnd);

    viewer.addEventListener('dragstart', (e) => e.preventDefault());
    
    // Загружаем первый кадр
    updateImage(1);
    
    console.log(`✅ 360° плеер с инерцией готов! Кадров: ${TOTAL_FRAMES}`);
    console.log(`📁 Первый файл: ${getImageUrl(1)}`);
    console.log(`⚡ Инерция включена: быстрый свайп → плавное затухание`);
</script>
</body>
</html>
